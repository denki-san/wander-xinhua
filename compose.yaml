services:
  xinhua-messenger:
    build:
      context: .
    container_name: xinhua-messenger
    restart: unless-stopped
    ports:
      - "127.0.0.1:8790:8790"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8790/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
