server {
    listen 80;
    listen [::]:80;

    server_name xinhua.denkisan.me;
    root /var/www/xinhua-messenger;
    index index.html;

    access_log /var/log/nginx/xinhua.denkisan.me.access.log;
    error_log /var/log/nginx/xinhua.denkisan.me.error.log;

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
